.spb.on{background:rgba(35,134,54,.15);border-color:#238636}.spb.on .nm{color:#3fb950}

.cnb.on{background:rgba(35,134,54,.15);border-color:#238636}.cnb.on .cn,.cnb.on .cl{color:#3fb950}

<body>
<div class="hdr">
  <div><h1>🏆 ProStats IA</h1><p>NBA · Tennis · Fútbol · Béisbol · Parlay</p></div>
  <span class="bdg" id="bdg">v2</span>
</div>
<div class="tabs">
  <button class="tab on" onclick="go('hm',this)">🏠 Inicio</button>
  <button class="tab" onclick="go('nba',this)">🏀 NBA</button>
  <button class="tab" onclick="go('ten',this)">🎾 Tennis</button>
  <button class="tab" onclick="go('fut',this)">⚽ Fútbol</button>
  <button class="tab" onclick="go('mlb',this)">⚾ Béisbol</button>
  <button class="tab" onclick="go('par',this)">🎰 Parlay</button>
  <button class="tab" onclick="go('trk',this)">📊 Tracker</button>
  <button class="tab" onclick="go('cfg',this)">⚙️ Config</button>
</div>
<div class="pg" id="pg"></div>
<script>
var GURL='https://api.groq.com/openai/v1/chat/completions';
var PS=new Set(['nba','mlb']);
var PN=4;

function GK(){try{var k=localStorage.getItem('gk');return(k&&k.length>10)?k:'';}catch(e){return '';}}
function ubdg(){var b=document.getElementById('bdg');if(GK()){b.textContent='KEY✓';b.style.color='#e3b341';}}
function savePick(p){try{var a=getPicks();a.unshift(p);if(a.length>100)a=a.slice(0,100);localStorage.setItem('picks',JSON.stringify(a));}catch(e){}}
function getPicks(){try{return JSON.parse(localStorage.getItem('picks')||'[]');}catch(e){return[];}}
function markResult(id,r){try{var a=getPicks();var p=a.find(function(x){return x.id===id;});if(p)p.result=r;localStorage.setItem('picks',JSON.stringify(a));}catch(e){}}
function clearPicks(){if(confirm('Limpiar historial?')){localStorage.removeItem('picks');pgTRK(document.getElementById('pg'));}}
function getBK(){try{return JSON.parse(localStorage.getItem('bk')||'{"s":100,"c":100}');}catch(e){return{s:100,c:100};}}
function saveBK2(s,c){try{localStorage.setItem('bk',JSON.stringify({s:s,c:c}));}catch(e){}}

window.addEventListener('load',function(){ubdg();fixKB();go('hm',document.querySelector('.tab.on'));});

function fixKB(){
  if(!window.visualViewport)return;
  window.visualViewport.addEventListener('resize',function(){
    var pg=document.getElementById('pg');if(!pg)return;
    var kb=window.innerHeight-window.visualViewport.height;
    pg.style.paddingBottom=(kb>80?kb+60:60)+'px';
  });
  document.addEventListener('focusin',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')
      setTimeout(function(){e.target.scrollIntoView({behavior:'smooth',block:'center'});},400);
  });
}

function go(s,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var pg=document.getElementById('pg');pg.innerHTML='';
  var fns={hm:pgHM,nba:pgNBA,ten:pgTEN,fut:pgFUT,mlb:pgMLB,par:pgPAR,trk:pgTRK,cfg:pgCFG};
  if(fns[s])fns[s](pg);
}

function G(id){return document.getElementById(id);}
function V(id){var e=G(id);return e?e.value.trim():'';}
function H(id,h){var e=G(id);if(e)e.innerHTML=h;}
function dis(id,b){var e=G(id);if(e)e.disabled=b;}
function DS(){return new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function LW(s){return(s||'').split(' ').slice(-1)[0];}
function LD(id,msg){H(id,'<div class="ld"><div class="sp"></div><span>'+msg+'</span></div>');}
function ER(id,msg){H(id,'<div class="err">⚠️ '+msg+'<br><br>• Intenta de nuevo<br>• Ve a Config y verifica tu key</div>');}
function SR(l,v,c){if(v===undefined||v===null||v==='')return '';return '<div class="sr"><span class="sl">'+l+'</span><span class="sv '+(c||'')+'">'+v+'</span></div>';}
function PK(icon,lbl,d){
  if(!d)return '';
  var c=d.conf||0;
  var clr=c>=85?'#3fb950':c>=80?'#56d364':c>=70?'#e3b341':'#8b949e';
  var cc=c>=82?'hi':c>=70?'mi':'';
  return '<div class="pc '+cc+'"><div class="pt"><span class="pm">'+icon+' '+lbl+'</span><span class="pp" style="color:'+clr+'">'+c+'%</span></div>'
    +'<div class="pv">'+(d.pick||'')+'</div><div class="pw">'+(d.why||d.razon||'')+'</div>'
    +'<div class="pb"><div class="pf" style="width:'+Math.min(c,100)+'%;background:'+clr+'"></div></div></div>';
}
function BP(d){
  var all=[d.ganador,d.total,d.ct,d.btts_pk,d.dop,d.hsets,d.carrera_t].filter(Boolean);
  var best={conf:0};all.forEach(function(x){if((x.conf||0)>(best.conf||0))best=x;});
  var bc=best.conf||0;if(bc<78)return '';
  var clr=bc>=87?'#3fb950':bc>=82?'#56d364':'#e3b341';
  return '<div class="bpk" style="background:'+clr+'10;border-color:'+clr+'44"><div class="bpk-l" style="color:'+clr+'">⭐ Mejor pick</div>'
    +'<div style="font-size:14px;font-weight:600;color:#e6edf3;margin-top:3px">'+(d.mejor||best.pick||'')+'</div>'
    +'<div style="font-size:26px;font-weight:700;color:'+clr+';margin-top:4px">'+bc+'%</div></div>';
}
function PBX(picks){
  var pp=(picks||[]).filter(function(p){return p&&(p.conf||0)>=80;}).slice(0,3);
  if(!pp.length)return '<div class="nop">Sin picks ≥80%.</div>';
  var cuota=pp.reduce(function(a,p){return a*(1/((p.conf||82)/100));},1).toFixed(2);
  var avg=(pp.reduce(function(a,p){return a+(p.conf||82);},0)/pp.length).toFixed(0);
  var rows=pp.map(function(p){return '<div class="pr"><div class="pr-t"><span class="pr-m">'+(p.mercado||'')+'</span><span class="pr-p">'+(p.conf||82)+'%</span></div><div class="pr-v">'+(p.pick||'')+'</div><div class="pr-w">'+(p.razon||p.why||'')+'</div></div>';}).join('');
  var g=[10,25,50,100].map(function(x){return '<div class="p2"><div class="p2l">$'+x+'</div><div class="p2a">$'+(x*parseFloat(cuota)).toFixed(0)+'</div></div>';}).join('');
  return '<div class="pby"><div class="pby-t">PARLAY '+pp.length+' PICKS · ~'+avg+'%</div><div class="pby-s">Cuota ~'+cuota+'x</div><div class="prows">'+rows+'</div><div class="pgn">'+g+'</div><div style="font-size:10px;color:#1a7f37;text-align:center;margin-top:8px">Juega responsablemente</div></div>';
}
var WARN='<div class="warn">⚠️ Verifica en <b>thestatsdontlie.com</b> y <b>SofaScore</b> antes de apostar.</div>';

// ESPN
async function espnFetch(url){
  try{var ctrl=new AbortController();setTimeout(function(){ctrl.abort();},7000);var r=await fetch(url,{signal:ctrl.signal});if(!r.ok)return null;return await r.json();}catch(e){return null;}
}
async function getNBAGames(){
  var d=await espnFetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard');
  if(!d||!d.events||!d.events.length)return [];
  return d.events.map(function(e){
    var comp=e.competitions&&e.competitions[0];var teams=comp&&comp.competitors||[];
    var home=teams.find(function(t){return t.homeAway==='home';});
    var away=teams.find(function(t){return t.homeAway==='away';});
    if(!home||!away)return null;
    var st=e.status&&e.status.type;
    return{home:home.team.displayName,away:away.team.displayName,hs:home.score||'',as:away.score||'',
      live:st&&st.name==='STATUS_IN_PROGRESS',final:st&&st.name==='STATUS_FINAL',
      time:comp.date?new Date(comp.date).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'America/Bogota'}):''};
  }).filter(Boolean);
}
async function getMLBGames(){
  var d=await espnFetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard');
  if(!d||!d.events||!d.events.length)return [];
  return d.events.map(function(e){
    var comp=e.competitions&&e.competitions[0];var teams=comp&&comp.competitors||[];
    var home=teams.find(function(t){return t.homeAway==='home';});
    var away=teams.find(function(t){return t.homeAway==='away';});
    if(!home||!away)return null;
    var st=e.status&&e.status.type;
    return{home:home.team.displayName,away:away.team.displayName,hs:home.score||'',as:away.score||'',
      live:st&&st.name==='STATUS_IN_PROGRESS',final:st&&st.name==='STATUS_FINAL',
      time:comp.date?new Date(comp.date).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'America/Bogota'}):''};
  }).filter(Boolean);
}
async function getTennisGames(){
  var d=await espnFetch('https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard');
  if(!d||!d.events||!d.events.length)return [];
  return d.events.map(function(e){
    var comp=e.competitions&&e.competitions[0];var pl=comp&&comp.competitors||[];
    var p1=pl[0];var p2=pl[1];if(!p1||!p2)return null;
    var n1=(p1.athlete&&p1.athlete.displayName)||(p1.team&&p1.team.displayName)||'?';
    var n2=(p2.athlete&&p2.athlete.displayName)||(p2.team&&p2.team.displayName)||'?';
    var st=e.status&&e.status.type;
    return{p1:n1,p2:n2,s1:p1.score||'',s2:p2.score||'',
      tournament:(comp.venue&&comp.venue.fullName)||'ATP Tour',
      live:st&&st.name==='STATUS_IN_PROGRESS',final:st&&st.name==='STATUS_FINAL'};
  }).filter(Boolean);
}
async function getFutGames(){
  var leagues=['eng.1','esp.1','ita.1','ger.1','col.1'];var all=[];
  for(var i=0;i<leagues.length;i++){

// AI
async function AI(prompt,maxT){
  if(!GK())throw new Error('Falta API Key. Ve a Config y agrega tu key de console.groq.com');
  var ctrl=new AbortController();var timer=setTimeout(function(){ctrl.abort();},35000);
  try{
    var resp=await fetch(GURL,{method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GK()},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:maxT||2000,temperature:0.1,
        messages:[{role:'system',content:'Eres analista deportivo experto. Responde SOLO con JSON valido empezando con {. Sin markdown ni texto extra.'},
          {role:'user',content:prompt}]})});
    clearTimeout(timer);
    if(!resp.ok){var e=await resp.json().catch(function(){return{};});var m=(e.error&&e.error.message)||'';
      if(resp.status===401)throw new Error('Key invalida. Ve a Config');
      if(resp.status===429)throw new Error('Limite alcanzado. Espera 1 minuto.');
      throw new Error(m||'Error '+resp.status);}
    var data=await resp.json();
    return(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
  }catch(e){clearTimeout(timer);if(e.name==='AbortError')throw new Error('Tiempo agotado. Intenta de nuevo.');throw e;}
}
function PJ(txt){
  var c=(txt||'').replace(/```json|```/g,'').trim();
  try{return JSON.parse(c);}catch(e){}
  var m=c.match(/\{[\s\S]*\}/);if(!m)return null;
  try{return JSON.parse(m[0]);}catch(e){}
  try{var s=m[0];var depth=0;for(var i=0;i<s.length;i++){if(s[i]==='{')depth++;else if(s[i]==='}')depth--;}while(depth>0){s+='}';depth--;}return JSON.parse(s);}catch(e){return null;}
}

// Fetch real odds from The Odds API
async function fetchOdds(sport, team1, team2){
  var key = getOddsKey();
  if(!key) return null;
  var sportMap = {
    football: 'soccer_epl',
    basketball: 'basketball_nba', 
    baseball: 'baseball_mlb',
    tennis: null
  };
  var sp = sportMap[sport];
  if(!sp) return null;
  try {
    var url = 'https://api.the-odds-api.com/v4/sports/'+sp+'/odds/?apiKey='+key+'&regions=eu&markets=h2h,totals&oddsFormat=decimal';
    var ctrl = new AbortController(); setTimeout(function(){ ctrl.abort(); }, 6000);
    var r = await fetch(url, {signal: ctrl.signal});
    if(!r.ok) return null;
    var data = await r.json();
    // Find matching game
    var t1 = (team1||'').toLowerCase();
    var t2 = (team2||'').toLowerCase();
    var match = data.find(function(g){
      var ht = (g.home_team||'').toLowerCase();
      var at = (g.away_team||'').toLowerCase();
      return (ht.includes(t1.split(' ')[0]) || t1.includes(ht.split(' ')[0])) ||
             (at.includes(t2.split(' ')[0]) || t2.includes(at.split(' ')[0]));
    });
    if(!match) return null;
    // Extract best odds
    var result = { home: null, away: null, draw: null, over: null, under: null, bookmaker: '' };
    if(match.bookmakers && match.bookmakers.length) {
      var bk = match.bookmakers[0];
      result.bookmaker = bk.title || '';
      (bk.markets||[]).forEach(function(mkt){
        if(mkt.key === 'h2h') {
          (mkt.outcomes||[]).forEach(function(o){
            if(o.name === match.home_team) result.home = o.price;
            else if(o.name === match.away_team) result.away = o.price;
            else result.draw = o.price;
          });
        }
        if(mkt.key === 'totals') {
          (mkt.outcomes||[]).forEach(function(o){
            if(o.name === 'Over') result.over = o.price;
            else result.under = o.price;
          });
        }
      });
    }
    return result;
  } catch(e){ return null; }
}

// Calculate EV (Expected Value)
// EV = (probability * odds) - 1
// Positive EV = value bet
function calcEV(confPct, odds){
  if(!odds || !confPct) return null;
  var prob = confPct / 100;
  var ev = (prob * odds) - 1;
  return Math.round(ev * 100) / 100;
}

function evColor(ev){
  if(ev === null) return '#8b949e';
  if(ev > 0.1) return '#3fb950';
  if(ev > 0) return '#56d364';
  if(ev > -0.1) return '#e3b341';
  return '#f85149';
}

function evLabel(ev){
  if(ev === null) return '–';
  if(ev > 0.1) return '✅ Valor alto';
  if(ev > 0) return '✅ Valor positivo';
  if(ev > -0.1) return '⚠️ Neutro';
  return '❌ Sin valor';
}

function renderOddsEV(odds, picks, home, away){
  if(!odds) return '<div style="background:#21262d;border-radius:8px;padding:10px 12px;font-size:11px;color:#8b949e">📊 Sin cuotas — Agrega tu Odds API key en Config para ver valor esperado real.</div>';
  
  var rows = '';
  
  // Home win
  if(odds.home) {
    var pick = picks.ganador;
    var conf = pick && (pick.pick||'').toLowerCase().includes(home.toLowerCase().split(' ')[0].toLowerCase()) ? pick.conf : null;
    var ev = calcEV(conf, odds.home);
    rows += oddsRow(home+' gana', odds.home, conf, ev, odds.bookmaker);
  }
  // Away win  
  if(odds.away) {
    var pick2 = picks.ganador;
    var conf2 = pick2 && (pick2.pick||'').toLowerCase().includes(away.toLowerCase().split(' ')[0].toLowerCase()) ? pick2.conf : null;
    var ev2 = calcEV(conf2, odds.away);
    rows += oddsRow(away+' gana', odds.away, conf2, ev2, odds.bookmaker);
  }
  // Draw
  if(odds.draw) {
    rows += oddsRow('Empate', odds.draw, null, null, odds.bookmaker);
  }
  // Over
  if(odds.over && picks.total) {
    var evO = calcEV(picks.total.conf, odds.over);
    rows += oddsRow('Over', odds.over, picks.total.conf, evO, odds.bookmaker);
  }

  return '<div style="background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden">'
    +'<div style="background:#21262d;padding:8px 12px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center">'
    +'<span style="font-size:11px;font-weight:700;color:#e6edf3">📊 Cuotas Reales + EV</span>'
    +'<span style="font-size:10px;color:#8b949e">'+odds.bookmaker+'</span>'
    +'</div>'+rows+'</div>';
}

function oddsRow(label, odds, conf, ev, bk){
  var ec = evColor(ev);
  var el2 = evLabel(ev);
  return '<div style="display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #21262d;gap:8px">'
    +'<span style="flex:1;font-size:12px;color:#e6edf3">'+label+'</span>'
    +'<span style="font-size:13px;font-weight:700;color:#e3b341">'+odds+'x</span>'
    +(conf?'<span style="font-size:11px;color:#8b949e">'+conf+'%</span>':'')
    +(ev!==null?'<span style="font-size:11px;font-weight:700;color:'+ec+'">'+(ev>0?'+':'')+ev+' '+el2+'</span>':'')
    +'</div>';
}

// Fetch weather for stadium/city
async function fetchWeather(city){
  try {
    // Using open-meteo (free, no key needed)
    // First geocode the city
    var geoR = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=es');
    if(!geoR.ok) return null;
    var geoD = await geoR.json();
    if(!geoD.results || !geoD.results.length) return null;
    var loc = geoD.results[0];
    // Get weather
    var wR = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+loc.latitude+'&longitude='+loc.longitude+'&current=temperature_2m,precipitation,wind_speed_10m,weather_code&timezone=auto');
    if(!wR.ok) return null;
    var wD = await wR.json();
    var curr = wD.current;
    var code = curr.weather_code;
    var desc = weatherDesc(code);
    var impact = weatherImpact(code, curr.wind_speed_10m, curr.precipitation);
    return {
      temp: Math.round(curr.temperature_2m),
      precip: curr.precipitation,
      wind: Math.round(curr.wind_speed_10m),
      desc: desc,
      impact: impact,
      city: loc.name
    };
  } catch(e){ return null; }
}

function weatherDesc(code){
  if(code === 0) return '☀️ Despejado';
  if(code <= 3) return '⛅ Parcialmente nublado';
  if(code <= 49) return '🌫️ Niebla';
  if(code <= 59) return '🌦️ Llovizna';
  if(code <= 69) return '🌧️ Lluvia';
  if(code <= 79) return '🌨️ Nieve';
  if(code <= 82) return '🌧️ Lluvia intensa';
  if(code <= 99) return '⛈️ Tormenta';
  return '🌤️ Variable';
}

function weatherImpact(code, wind, precip){
  var impacts = [];
  if(code >= 60 || precip > 1) impacts.push('🌧️ Lluvia → menos goles, menos corners');
  if(wind > 30) impacts.push('💨 Viento fuerte → afecta centros y tiros lejanos');
  if(code >= 80) impacts.push('⛈️ Lluvia intensa → campo pesado, juego directo');
  if(code === 0 && wind < 15) impacts.push('☀️ Condiciones perfectas → juego fluido');
  return impacts.length ? impacts : ['⚽ Sin impacto significativo en el juego'];
}

function renderWeather(w){
  if(!w) return '';
  var impactColor = w.impact[0].includes('Lluvia') || w.impact[0].includes('Tormenta') ? '#e3b341' : '#3fb950';
  return '<div style="background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden">'
    +'<div style="background:#21262d;padding:8px 12px;border-bottom:1px solid #30363d">'
    +'<span style="font-size:11px;font-weight:700;color:#e6edf3">🌤️ Clima en '+w.city+'</span>'
    +'</div>'
    +'<div style="padding:10px 12px">'
    +'<div style="display:flex;gap:16px;margin-bottom:8px">'
    +'<div style="text-align:center"><div style="font-size:20px">'+w.desc.split(' ')[0]+'</div><div style="font-size:11px;color:#8b949e">'+w.desc.split(' ').slice(1).join(' ')+'</div></div>'
    +'<div style="flex:1">'
    +'<div style="display:flex;gap:12px;font-size:12px;color:#8b949e;margin-bottom:4px">'
    +'<span>🌡️ '+w.temp+'°C</span>'
    +'<span>💧 '+w.precip+'mm</span>'
    +'<span>💨 '+w.wind+'km/h</span>'
    +'</div>'
    +w.impact.map(function(i){ return '<div style="font-size:11px;color:'+impactColor+';margin-top:3px">'+i+'</div>'; }).join('')
    +'</div></div></div></div>';
}

// Enhanced renderFUT with odds + weather
var _origRenderFUT = renderFUT;
function renderFUT(d, h, a, lg){
  _origRenderFUT(d, h, a, lg);
  // Now fetch odds and weather in background and inject
  var city = getCityFromTeam(h, lg.n);
  Promise.all([
    fetchOdds('football', h, a),
    city ? fetchWeather(city) : Promise.resolve(null)
  ]).then(function(results){
    var odds = results[0];
    var weather = results[1];
    var fRes = G('fRes');
    if(!fRes) return;
    // Find the card-b div and inject before last g2 button
    var oddsHtml = renderOddsEV(odds, d, h, a);
    var weatherHtml = renderWeather(weather);
    // Create injection div
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-top:10px;padding:0 14px 14px';
    div.innerHTML = weatherHtml + oddsHtml;
    // Find the card inside fRes and append
    var card = fRes.querySelector('.card');
    if(card){
      var cardB = card.querySelector('.card-b');
      if(cardB) cardB.appendChild(div);
    }
  });
}

function getCityFromTeam(team, league){
  var cities = {
    'Arsenal': 'London', 'Chelsea': 'London', 'Tottenham': 'London',
    'Manchester City': 'Manchester', 'Manchester United': 'Manchester',
    'Liverpool': 'Liverpool', 'Everton': 'Liverpool',
    'Real Madrid': 'Madrid', 'Barcelona': 'Barcelona', 'Atletico': 'Madrid',
    'Bayern': 'Munich', 'Dortmund': 'Dortmund',
    'PSG': 'Paris', 'Juventus': 'Turin', 'Milan': 'Milan', 'Inter': 'Milan',
    'Lakers': 'Los Angeles', 'Clippers': 'Los Angeles',
    'Knicks': 'New York', 'Nets': 'New York',
    'Bulls': 'Chicago', 'Heat': 'Miami', 'Celtics': 'Boston'
  };
  for(var k in cities){
    if(team.toLowerCase().includes(k.toLowerCase())) return cities[k];
  }
  return null;
}
